service: payment-api

slo:
  availability:
    target: 99.9
    window: 30d
    description: "Monthly uptime for checkout flow"
  latency_p95_ms: 300
  latency_p99_ms: 800
  error_budget: 0.1
  description: "95th percentile latency target"

alerts:
  - name: HighErrorRate
    condition: error_rate > 0.01
    duration: 5m
    channel: payments-oncall
  - name: HighLatency
    condition: latency_p95 > 500
    duration: 10m
    channel: payments-oncall
